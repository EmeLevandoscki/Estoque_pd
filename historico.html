<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico - Gerenciador de Estoque & Pedidos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lock-screen" id="tela-bloqueio">
    <div class="lock-card">
      <h2 id="lock-titulo">Sistema Bloqueado</h2>
      <p id="lock-subtitulo">Insira a sua senha de acesso</p>
      <input type="password" id="campo-senha" placeholder="••••" onkeydown="if(event.key==='Enter') verificarSenha()">
      <button class="primary" onclick="verificarSenha()" id="btn-lock">Entrar</button>
    </div>
  </div>

  <div class="app" id="app-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
      <h1>Gerenciador de Estoque & Pedidos</h1>
      <button class="sm danger" onclick="bloquearSistema()">Bloquear</button>
    </div>

    <div class="tabs">
      <a class="tab-btn" href="index.html">Estoque</a>
      <a class="tab-btn" href="pedidos.html">Pedidos</a>
      <a class="tab-btn" href="clientes.html">Clientes</a>
      <a class="tab-btn active" href="historico.html">Histórico</a>
    </div>

    <!-- PAINEL DE HISTÓRICO (inalterado) -->
    <div id="historico" class="panel active">
      <h2>Histórico de pedidos</h2>
      <div style="margin-bottom:1.25rem">
        <select id="filtro-cliente" onchange="renderHistorico()" style="max-width:280px;">
          <option value="">Todos os clientes</option>
        </select>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Produtos</th>
              <th>Total</th>
              <th>Pago</th>
              <th>Parcelas</th>
              <th>Forma</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody-historico"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
