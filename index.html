<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início - Gerenciador de Estoque & Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lock-screen" id="tela-bloqueio">
    <div class="lock-card">
      <h2 id="lock-titulo">Sistema Bloqueado</h2>
      <p id="lock-subtitulo">Insira a sua senha de acesso</p>
      <input type="password" id="campo-senha" placeholder="••••" onkeydown="if(event.key==='Enter') verificarSenha()">
      <button class="primary" onclick="verificarSenha()" id="btn-lock">Entrar</button>
    </div>
  </div>

  <div class="app" id="app-container">
    <div style="display:flex; justify-content:flex-end; margin-bottom: 0.5rem;">
      <button class="sm danger" onclick="bloquearSistema()">Bloquear</button>
    </div>

    <div class="tabs">
      <a class="tab-btn active" href="index.html">Início</a>
      <a class="tab-btn" href="estoque.html">Estoque</a>
      <a class="tab-btn" href="pedidos.html">Pedidos</a>
      <a class="tab-btn" href="clientes.html">Clientes</a>
    </div>

    <!-- PAINEL DE INÍCIO: LANÇADOR DE AÇÕES RÁPIDAS -->
    <div id="inicio" class="panel active">
      <div class="action-launcher">
        <div class="greeting">Olá</div>
        <div class="greeting-sub">O que você quer fazer?</div>

        <button type="button" class="hero-banner" onclick="window.location.href='pedidos.html'">
          <span class="hero-banner-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l1 6 5-3 5 3 1-6"/><path d="M4 8h16v13H4z"/><path d="M12 13v5M9.5 15.5h5"/></svg>
          </span>
          <span class="hero-banner-text">
            <span class="hero-banner-title">Novo pedido</span>
            <span class="hero-banner-sub">Registrar uma venda</span>
          </span>
        </button>

        <div class="action-grid">
          <button type="button" class="action-tile" onclick="window.location.href='clientes.html'">
            <span class="action-tile-icon" style="background:var(--sage-soft); color:var(--sage);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h20M2 8v10a2 2 0 002 2h16a2 2 0 002-2V8M2 8V6a2 2 0 012-2h16a2 2 0 012 2v2"/><path d="M15 14h3"/></svg>
            </span>
            <span class="action-tile-title">Registrar pagamento</span>
            <span class="action-tile-sub">Cliente pagou</span>
          </button>

          <button type="button" class="action-tile" onclick="window.location.href='estoque.html?novo=produto'">
            <span class="action-tile-icon" style="background:var(--amber-soft); color:var(--amber);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>
            </span>
            <span class="action-tile-title">Novo produto</span>
            <span class="action-tile-sub">Adicionar ao estoque</span>
          </button>

          <button type="button" class="action-tile" onclick="window.location.href='clientes.html?buscar=1'">
            <span class="action-tile-icon" style="background:var(--forest-soft); color:var(--forest);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M21 21l-6-6"/></svg>
            </span>
            <span class="action-tile-title">Buscar cliente</span>
            <span class="action-tile-sub">Ver quem deve</span>
          </button>

          <button type="button" class="action-tile" onclick="window.location.href='clientes.html#resumo-financeiro'">
            <span class="action-tile-icon" style="background:var(--brick-soft); color:var(--brick);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/><path d="M15 7h4v4"/></svg>
            </span>
            <span class="action-tile-title">Ver relatório</span>
            <span class="action-tile-sub">Últimos 30 dias</span>
          </button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a class="bottom-nav-item active" href="index.html">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
        Início
      </a>
      <a class="bottom-nav-item" href="estoque.html">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8l9 5 9-5Z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
        Estoque
      </a>
      <a class="bottom-nav-item" href="pedidos.html">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12v18l-3-2-3 2-3-2-3 2Z"/><path d="M9 8h6M9 12h6"/></svg>
        Pedidos
      </a>
      <a class="bottom-nav-item" href="clientes.html">
        <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17" cy="9" r="2.3"/><path d="M15.5 14.2c2.4.5 4 2.6 4 5.8"/></svg>
        Clientes
      </a>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
